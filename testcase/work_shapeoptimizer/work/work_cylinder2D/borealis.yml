# Configuration file for Borealis code

adapter: 
  # tacode, simple_function, or example_externalcode
  kind_adapter: shapeoptimizer
  

optimizer: 
  # Bayesian_optimization or PSO
  #kind_optimizer: Bayesian_optimization
  kind_optimizer: PSO


parameter_optimized:
  # Parameter boundaries
  boundary:
    - name: 'Coord1'
      component:
        - type: x
          bound_min: -1.e-2
          bound_max:  1.e-2
        - type: y
          bound_min: -1.e-2
          bound_max:  1.e-2
      coordinate:
        -  0.0
        -  0.0
    - name: 'Coord2'
      component:
        - type: x
          bound_min: -1.e-1
          bound_max:  1.e-1
        - type: y
          bound_min: -1.e-1
          bound_max:  1.e-1
      coordinate:
        -  0.2
        -  0.0
    - name: 'Coord3'
      component:
        - type: x
          bound_min: -1.e-2
          bound_max:  1.e-2
        - type: y
          bound_min: -1.e-1
          bound_max:  1.e-1
      coordinate:
        -  0.1  
        -  0.1
    - name: 'Coord4'
      component:
        - type: x
          bound_min: -1.e-2
          bound_max:  1.e-2
        - type: y
          bound_min: -1.e-1
          bound_max:  1.e-1
      coordinate:
        -  0.1
        - -0.1

  boundary_initial: 
    bound_min: -1.e-2
    bound_max:  1.e-2

  velocity_initial: 
    velocity_min: -1.e-1
    velocity_max:  1.e-1

  # Penalty
  flag_penalty: True
  penalty_value: 10000.0
  

PSO: # Particle swarm optimization
  # Number of iterations
  num_optiter: 300

  # Number of particles
  num_particle: 6

  # Minimize or maximize the objective function
  maximize: False

  # Tolerance of effor of objective function
  tolerance: 1.e-5

  # Residual of error in objective function (relative_change or relative_value), defalut: relative_change
  kind_residual_computation: relative_value

  # Particle parameter for PSO
  inertia: 0.5
  cognitive_coef: 1.5
  social_coef: 1.5

  times_spte_pso: 1.e-0 #2.5e-2

  # Results data file (Tecplot data format)
  result_dir: result_PSO
  filename_output: output_PSO.dat
  filename_global: output_global.dat  


shapeoptimizer:

  # Code system: python3 (tacode ver2.0) or Fortran (tacoed ver1.0)
  #code_system: fortran

  # tacode case directory
  work_dir: work_shapeoptimizer
  case_dir: case
  step_digit: 2

  directory_path_specify: manual # default or manual
  manual_path: ../../template/work_cylinder_subsonic

  # Executing script
  cmd_code: ./run_SU2-OPT_pps.sh
  
  # Control file
  #filename_control: orbit.ctl

  # Coupling simulation parameters
  work_dir_series: optimization
  step_digit_series: 5
  filename_forces: forces.dat
  filename_displacements: displacements.dat

  # Result file name computed by Tacode
  filename_result: trajectory.dat

  # Result trajectory of Tacode 
  result_dir: result_shapeoptimization
  flag_output: False
  filename_output: output_result.dat

  # Force index: 0:Drag, 1: Lift
  power_variable_objectivefunction: 
    - 1
    - 0