# Configuration file for Borealis: shapeoptimizer_preCICE.py
# Borealis version: v1.4.0

# Specify if we need to initialize MPI
with_MPI: False

# Specify preCICE participant name
precice_name: "Optimizer"

# Specify preCICE config file
precice_config: "../precice-config.xml"

# Specify the preCICE mesh name"
precice_mesh: "Optimizer-Mesh"

# Dimension of optimizer domain (2D/3D): 2 or 3
nDim: 2

# preCICE writing and reading variables
precice_write: "Displacement"
precice_read: "Force"

precice_write_var_initial: 1.e-3
precice_read_var_initial : 0.e-0


# Filename for coordinate of marker points
filename_marker: "marker_points.dat"

# Center of gravity
center_of_gravity: 
  - 0.1
  - 0.0

# Time variables
timestep: 1.e-3
iteration_start: 0
